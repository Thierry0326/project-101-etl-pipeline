# ============================================
# PROJECT 101 - GITHUB ACTIONS CI/CD
# Purpose: Automatically run tests on
#          every push or pull request
# ============================================

name: Project 101 - ETL Pipeline Tests

# ============================================
# TRIGGERS
# When does this workflow run?
# ============================================
on:
  push:
    branches: [main] # Every push to main
  pull_request:
    branches: [main] # Every pull request to main

# ============================================
# JOBS
# ============================================
jobs:
  # ------------------------------------------
  # JOB 1: Run Pytest Tests
  # ------------------------------------------
  test:
    name: Run Pytest Suite
    runs-on: ubuntu-latest # Runs on GitHub's Linux server

    steps:
      # Step 1: Checkout code from GitHub
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: 🐍 Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip" # Cache pip for faster runs

      # Step 3: Install dependencies
      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy python-dotenv pytest pytest-cov sqlalchemy

      # Step 4: Create dummy .env for tests
      # (Real .env is never on GitHub!)
      - name: 🔐 Create Test Environment File
        run: |
          cat > .env << EOF
          MSSQL_SA_PASSWORD=Test@Password123
          MSSQL_SERVER=localhost,1434
          MYSQL_ROOT_PASSWORD=testroot123
          MYSQL_DATABASE=stackoverflow_processed
          MYSQL_USER=project101_user
          MYSQL_PASSWORD=testpassword123
          MYSQL_HOST=localhost
          MYSQL_PORT=3307
          GRAFANA_PASSWORD=testgrafana123
          AIRFLOW_SECRET_KEY=testairflowkey123
          AIRFLOW_ADMIN_PASSWORD=testadmin123
          AIRFLOW_ALERT_EMAIL=test@example.com
          AIRFLOW_EMAIL_SMTP_HOST=smtp.gmail.com
          AIRFLOW_EMAIL_SMTP_PORT=587
          AIRFLOW_EMAIL_SMTP_USER=test@example.com
          AIRFLOW_EMAIL_SMTP_PASSWORD=testsmtp123
          EOF

      # Step 5: Create required folders
      - name: 📁 Create Required Folders
        run: |
          mkdir -p logs
          mkdir -p data/raw
          mkdir -p data/processed

      # Step 6: Run Pytest with coverage report
      - name: 🧪 Run Tests
        run: |
          pytest tests/ -v \
            --tb=short \
            --cov=pipeline \
            --cov-report=term-missing \
            --cov-report=xml

      # Step 7: Upload coverage report
      - name: 📊 Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always() # Upload even if tests fail
        with:
          name: coverage-report
          path: coverage.xml

  # ------------------------------------------
  # JOB 2: Code Quality Check
  # ------------------------------------------
  lint:
    name: Check Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: 📦 Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      # Check code style & common errors
      - name: 🔍 Run Flake8 Linter
        run: |
          flake8 pipeline/ \
            --max-line-length=100 \
            --extend-ignore=E203,E221,E226,E241,E251,E266,W292,W293,W504,E126,E131,E302,E303 \
            --statistics \
            --count

  # ------------------------------------------
  # JOB 3: Validate SQL Files
  # ------------------------------------------
  validate-sql:
    name: Validate SQL Files
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # Check SQL files exist and are not empty
      - name: 🗄️ Validate SQL Schema Files
        run: |
          echo "Checking SQL files exist..."

          files=(
            "sql/mssql_schema.sql"
            "sql/mysql_schema.sql"
            "sql/security_setup.sql"
          )

          for file in "${files[@]}"; do
            if [ -f "$file" ]; then
              lines=$(wc -l < "$file")
              echo "✅ $file exists ($lines lines)"
            else
              echo "❌ $file is MISSING!"
              exit 1
            fi
          done

          echo "✅ All SQL files validated!"

  # ------------------------------------------
  # JOB 4: Validate Docker Compose
  # ------------------------------------------
  validate-docker:
    name: Validate Docker Compose
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # Create dummy .env for docker validation
      - name: 🔐 Create Test Environment File
        run: |
          cp .env.example .env
          sed -i 's/YourStrong@Password123/TestPassword123/g' .env
          sed -i 's/your_secret_key_here/testsecretkey123/g' .env

      - name: 🐳 Validate Docker Compose File
        run: |
          docker compose config
          echo "✅ Docker Compose file is valid!"

# ```

# ---

# ### 📖 What GitHub Actions Does:
# ```
# You push code to GitHub
#         ↓
# GitHub automatically runs 4 jobs IN PARALLEL:

# Job 1: Run Pytest          Job 2: Code Quality
# ├── Checkout code          ├── Checkout code
# ├── Setup Python           ├── Setup Python
# ├── Install packages       ├── Install flake8
# ├── Create test .env       └── Check code style
# └── Run all 30+ tests

# Job 3: Validate SQL        Job 4: Validate Docker
# ├── Check SQL files exist  ├── Validate docker-compose.yml
# └── Verify not empty       └── Check syntax is correct
#         ↓
# All 4 jobs pass → ✅ Green badge on README
# Any job fails   → ❌ Red badge + email notification
