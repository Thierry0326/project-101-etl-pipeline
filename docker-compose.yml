# version: "3.8"

services:
  # ============================================
  # SQL SERVER - Raw/Staging Database
  # ============================================
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: project101_sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${MSSQL_SA_PASSWORD}
      - MSSQL_PID=Developer
    ports:
      - "1434:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - project101_network
    restart: unless-stopped

  # ============================================
  # MYSQL - Processed/Analytics Database
  # ============================================
  mysql:
    image: mysql:8.0
    container_name: project101_mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - project101_network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================
  # GRAFANA - Monitoring Dashboard
  # ============================================
  grafana:
    image: grafana/grafana:latest
    container_name: project101_grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - project101_network
    restart: unless-stopped

  # ============================================
  # AIRFLOW - Pipeline Orchestration
  # Uses custom image with our dependencies
  # ============================================
  airflow:
    build: .
    container_name: project101_airflow
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=mysql+mysqlconnector://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/airflow_metadata
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_SECRET_KEY}
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_SECRET_KEY}
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./pipeline:/opt/airflow/pipeline
      - ./logs:/opt/airflow/logs
      - airflow_logs:/opt/airflow/logs
    networks:
      - project101_network
    restart: unless-stopped
    command: bash -c "
      pip install PyMySQL &&
      airflow db init &&
      airflow users create
      --username admin
      --password ${AIRFLOW_ADMIN_PASSWORD}
      --firstname Admin
      --lastname User
      --role Admin
      --email ${AIRFLOW_ALERT_EMAIL} &&
      airflow webserver &
      airflow scheduler"

# ============================================
# VOLUMES - Persistent Data Storage
# ============================================
volumes:
  sqlserver_data:
  mysql_data:
  grafana_data:
  airflow_logs:

# ============================================
# NETWORK - All containers talk to each other
# ============================================
networks:
  project101_network:
    driver: bridge
